name: ops-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app homepage
        run: |
          set -euo pipefail
          APP_URL="__APP_URL__"
          html=$(curl -fsSL --max-time 20 "$APP_URL")
          echo "$html" | grep -q "__APP_NAME__"

      - name: Check Streamlit health endpoint
        run: |
          set -euo pipefail
          APP_URL="__APP_URL__"
          curl -fsSL --max-time 20 "${APP_URL}_stcore/health" | grep -q "ok"

  alert-on-failure:
    needs: smoke-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create or update incident issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[OPS ALERT] Streamlit smoke check failed';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '자동 모니터링에서 앱 상태 점검 실패.',
              '',
              `- Time (UTC): ${new Date().toISOString()}`,
              `- App: __APP_URL__`,
              `- Failed run: ${runUrl}`,
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,ops',
              per_page: 50,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'ops'],
              });
            }
