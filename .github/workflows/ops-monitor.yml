name: ops-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app homepage
        run: |
          set -euo pipefail
          APP_URL="https://cisco-ai-dashboard-evgjvkylz8ilrnxokasthb.streamlit.app/"
          echo "Checking ${APP_URL}"
          html=$(curl -fsSL --max-time 20 "$APP_URL")
          echo "$html" | grep -q "Cisco Technical AI Dashboard"

      - name: Check Streamlit health endpoint
        run: |
          set -euo pipefail
          APP_URL="https://cisco-ai-dashboard-evgjvkylz8ilrnxokasthb.streamlit.app/"
          curl -fsSL --max-time 20 "${APP_URL}_stcore/health" | grep -q "ok"

  alert-on-failure:
    needs: smoke-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create incident issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[OPS ALERT] Streamlit smoke check failed - ${new Date().toISOString()}`;
            const body = [
              '자동 모니터링에서 앱 상태 점검 실패.',
              '',
              '- Workflow: ops-monitor',
              '- App: https://cisco-ai-dashboard-evgjvkylz8ilrnxokasthb.streamlit.app/',
              '- Action: Streamlit Cloud 로그 확인 후 RUNBOOK.md 절차 수행',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident', 'ops']
            });
